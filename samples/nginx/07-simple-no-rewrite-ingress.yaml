# Simple Ingress with no rewrite — just host-based routing and TLS
# Tests the baseline annotation swap without rewrite complexity
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-svc
  namespace: marketing
  labels:
    app: homepage
spec:
  type: ClusterIP
  selector:
    app: homepage
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-host
  namespace: marketing
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.example.com
      secretName: www-tls-secret
  rules:
    - host: www.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage-svc
                port:
                  number: 80
